            flex-direction: column;

        .panel {

            border-radius: 8px;

            flex-direction: column;
        }

        .panel h3 {

            padding: 10px;
            font-family: monospace;
            resize: vertical;

        }

        .drop-zone {

            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;

        .drop-zone:hover, .drop-zone.dragover {

        #fileInput { display: none; }

        .full-width {

        }

        .list-preview {

            padding: 10px;
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 15px;
        }

        .preview-item {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #313244;
        }
        
        .preview-item:last-child { border-bottom: none; }
        .arrow { color: var(--accent); font-weight: bold; }
        .original-name { color: #f38ba8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .new-name { color: var(--success); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        button {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background-color: var(--border); color: #a6adc8; cursor: not-allowed; }

        .status-text {
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

            <input type="file" id="fileInput" multiple accept=".m3u8">
        </div>

        <button id="processBtn" disabled>İsimlendir ve ZIP Olarak İndir</button>
    </div>
</div>

<script>
    const listInput = document.getElementById('listInput');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const processBtn = document.getElementById('processBtn');
    const preview = document.getElementById('preview');
    
    let selectedFiles = [];
    let parsedNames = [];

    // --- Metni Çözümleme (Parsing) ---
    function parseListText() {
        const text = listInput.value;
        const lines = text.split('\n');
        const names = [];
        
        // Sadece "Sayı. Başlık" ile başlayan satırları yakala
        const regex = /^(\d+)\.\s+(.*)$/;

        // Atlanacak MP4 dosyalarının numaraları (33 ve 142)
        const skippedNumbers = [33, 142];

        for (let line of lines) {
            line = line.trim();
            const match = line.match(regex);
            
            if (match) {
                const numInt = parseInt(match[1], 10);
                
                // Eğer bu numara atlanacaklar listesindeyse, bunu isim listesine ekleme
                if (skippedNumbers.includes(numInt)) {
                    continue; 
                }

                // Dosya adında soruna yol açabilecek karakterleri temizle (\ / : * ? " < > |)
                const safeTitle = match[2].replace(/[\\/:*?"<>|]/g, '-').trim();
                
                // Numarayı 3 haneli yap (001, 002... 150)
                const num = String(match[1]).padStart(3, '0');
                
                names.push(`${num} - ${safeTitle}.m3u8`);
            }
        }
        return names;
    }

    // Listede değişiklik yapıldığında (veya ilk açılışta)
    listInput.addEventListener('input', () => {
        if(selectedFiles.length > 0) updateUI();
    });

    // --- Sürükle Bırak İşlemleri ---
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    processBtn.addEventListener('click', generateZip);

    // --- Mantık ---
    function handleFiles(fileList) {
        const files = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.m3u8'));
        
        if (files.length === 0) {
            status.textContent = "Seçilenler arasında hiç .m3u8 dosyası bulunamadı!";
            status.style.color = "var(--error)";
            return;
        }

        // Değiştirilme tarihine göre sırala (Eskiden Yeniye)
        selectedFiles = files.sort((a, b) => a.lastModified - b.lastModified);

        updateUI();
    }

    function updateUI() {
        parsedNames = parseListText();
        
        status.textContent = `${selectedFiles.length} dosya yüklendi. ${parsedNames.length} isim tespit edildi.`;
        status.style.color = "var(--text-color)";
        
        if (selectedFiles.length !== parsedNames.length) {
            status.textContent += ` (DİKKAT: Sayılar eşleşmiyor!)`;
            status.style.color = "var(--error)";
        }

        preview.style.display = 'block';
        processBtn.disabled = false;
        
        // Önizleme oluştur
        const maxLimit = Math.min(selectedFiles.length, parsedNames.length);
        let html = '';
        
        for (let i = 0; i < maxLimit; i++) {
            html += `
                <div class="preview-item">
                    <div class="original-name" title="${selectedFiles[i].name}">${selectedFiles[i].name}</div>
                    <div class="arrow">&rarr;</div>
                    <div class="new-name" title="${parsedNames[i]}">${parsedNames[i]}</div>
                </div>
            `;
        }
        
        if(selectedFiles.length > parsedNames.length) {
            html += `<div style="color: var(--error); padding-top: 10px;">Fazladan ${selectedFiles.length - parsedNames.length} dosya var, isimlendirilemeyecek!</div>`;
        } else if (parsedNames.length > selectedFiles.length) {
            html += `<div style="color: var(--error); padding-top: 10px;">Fazladan ${parsedNames.length - selectedFiles.length} isim var, karşılık gelen dosya yok!</div>`;
        }

        preview.innerHTML = html;
    }

    async function generateZip() {
        status.textContent = "ZIP dosyası hazırlanıyor... Lütfen bekleyin.";
        status.style.color = "var(--accent)";
        processBtn.disabled = true;

        const zip = new JSZip();
        const folder = zip.folder("isimlendirilmis_kurs_videolari");
        
        // Sadece eşleşebilen dosyaları ekle
        const maxLimit = Math.min(selectedFiles.length, parsedNames.length);

        for(let i=0; i < maxLimit; i++) {
            folder.file(parsedNames[i], selectedFiles[i]);
        }

        try {
            const content = await zip.generateAsync({type: "blob"});
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "Kurs_Videolari_M3U8.zip";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            status.textContent = "İndirme başlatıldı!";
            status.style.color = "var(--success)";
            processBtn.disabled = false;
        } catch (err) {
            console.error(err);
            status.textContent = "ZIP dosyası oluşturulurken bir hata oluştu.";
            status.style.color = "var(--error)";
            processBtn.disabled = false;
        }
    }
</script>

</body>
</html>
